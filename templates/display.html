<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">

    <!-- スマホ対応 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ビンゴ表示</title>

    <script src="static/js/tailwind.js"></script>
</head>

<body class="bg-slate-950 text-white min-h-screen">

    <!-- 全体コンテナ -->
    <div class="max-w-7xl mx-auto px-6 py-12">

        <!-- タイトル -->
        <h1 class="text-6xl font-bold text-center mb-12">
            オネスト納涼会スペシャルBINGO
        </h1>

        <!-- 現在の抽選結果表示エリア -->
        <div class="bg-slate-900 rounded-3xl p-16 shadow-xl text-center">

            <p class="text-slate-400 text-2xl mb-8">
                抽選結果
            </p>

            <!-- 最新の数字を表示 -->
            <div
                id="current-number"
                class="font-black break-words"
            >
                -
            </div>
            
            <p
                id="timer"
                class="text-4xl font-bold text-red-500 mt-6"
            ></p>

            <img
                id="quiz-image"
                class="hidden mx-auto mt-8 max-h-[500px] rounded-2xl"
            />

        </div>

        <!-- 抽選履歴エリア -->
        <div class="mt-10 bg-slate-900 rounded-3xl p-6">

            <h2 class="text-2xl font-bold mb-4">
                抽選履歴
            </h2>

            <!-- JavaScriptで履歴を追加 -->
            <div
                id="history"
                class="flex flex-wrap gap-3"
            >
            </div>

        </div>
        <button
    id="open-answer"
    class="fixed bottom-8 right-8 bg-amber-600 px-6 py-3 rounded-xl hidden">
    答え
</button>

<div
    id="answer-modal"
    class="fixed inset-0 bg-black/70 hidden items-center justify-center">

    <div class="bg-slate-900 p-10 rounded-3xl max-w-2xl">
        <div id="answer-text"
             class="text-4xl font-bold text-center">
        </div>
        <div id="answer-explanation"
            class="text-xl text-slate-300 mt-4 text-center">
        </div>
    </div>

</div>

    </div>

 <script>
// サーバーから現在状態を取得して画面へ反映
async function refresh() {

    try {

        const response = await fetch("/state");
        const data = await response.json();

        // 現在表示
        const current =
            document.getElementById("current-number");

        current.textContent = data.current;

        // 回答
        document.getElementById("answer-text").textContent =
            data.type === "quiz"
                ? (data.answer || "")
                : "";
            
        document.getElementById("answer-explanation").textContent =
            data.type === "quiz"
                ? (data.explanation || "")
                : "";

        // サイズ切替
        if (data.type === "quiz") {
            current.className =
                "text-5xl md:text-7xl font-black break-words";
        } else {
            current.className =
                "text-[12rem] md:text-[16rem] font-black leading-none";
        }

        // 履歴
        const historyDiv =
            document.getElementById("history");

        historyDiv.innerHTML = "";

        for (const num of data.history.slice().reverse()) {

            const item =
                document.createElement("div");

            item.className =
                "bg-slate-800 px-4 py-2 rounded-xl text-xl font-bold";

            item.textContent = num;

            historyDiv.appendChild(item);
        }

        // 回答モーダル
        const modal =
            document.getElementById("answer-modal");

        if (data.show_answer) {
            modal.classList.remove("hidden");
            modal.classList.add("flex");
        } else {
            modal.classList.remove("flex");
            modal.classList.add("hidden");
        }

        // 画像
        const img =
             document.getElementById("quiz-image");

        if (data.type === "quiz" && data.image) {
            img.src = data.image;
            img.classList.remove("hidden");
        } else {
            img.classList.add("hidden");
            img.src = "";
        }

        // ✅ タイマー
        const timerEl =
            document.getElementById("timer");

        if (data.type === "quiz" && data.remaining !== null) {

            timerEl.textContent =
                `残り ${data.remaining} 秒`;

            if (data.remaining <= 3) {
                timerEl.classList.add("text-red-600");
                timerEl.classList.remove("text-red-500");
            } else {
                timerEl.classList.add("text-red-500");
                timerEl.classList.remove("text-red-600");
            }

        } else {

            timerEl.textContent = "";
        }

    } catch (error) {
        console.error(error);
    }
}

// 定期更新
setInterval(refresh, 500);

// 初回
refresh();
</script>

</body>
</html>
