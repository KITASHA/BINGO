<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">

    <!-- スマホ対応 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ビンゴ表示</title>

    <!-- Tailwind CSS -->
    <script src="/static/js/tailwind.js"></script>

    <!-- フィーバー演出用CSS -->
    <link rel="stylesheet" href="/static/css/fever.css">
</head>


<body class="bg-slate-950 text-white min-h-screen">

    <!-- 効果音 -->
    <audio
        id="drumroll-sound"
        src="/static/sound/ドラムロール.mp3"
        preload="auto"
        loop>
    </audio>

    <audio
        id="cymbal-sound"
        src="/static/sound/クラッシュシンバル.mp3"
        preload="auto">
    </audio>

    <audio
        id="question-sound"
        src="/static/sound/出題.mp3"
        preload="auto">
    </audio>

    <audio
        id="timer-sound"
        src="/static/sound/タイマー.mp3"
        preload="auto">
    </audio>

    <!-- 全体コンテナ -->
    <div class="max-w-7xl mx-auto px-6 py-12">

        <!-- タイトル -->
        <h1 class="text-6xl font-bold text-center mb-12">
            オネスト納涼会スペシャルBINGO
        </h1>

        <!-- 現在の抽選結果表示エリア -->
        <div class="bg-slate-900 rounded-3xl p-16 shadow-xl text-center">

            <!-- 表示タイトル -->
            <p
                id="result-title"
                class="text-slate-400 text-2xl mb-8"
            >
                抽選結果
            </p>

            <!-- 最新の数字または問題文 -->
            <div
                id="current-number"
                class="font-black break-words"
            >
                -
            </div>

            <!-- クイズ用カウントダウン -->
            <p
                id="timer"
                class="text-4xl font-bold text-red-500 mt-6"
            ></p>

            <!-- 問題画像 -->
            <!-- <img
                id="quiz-image"
                class="hidden mx-auto mt-8 max-h-[500px] rounded-2xl"
            /> -->

            
            <img
                id="quiz-image"
                class="hidden mx-auto mt-4 max-h-[450px] max-w-full object-contain rounded-2xl"
            />


        </div>

        <!-- 抽選履歴エリア -->
        <div class="mt-10 bg-slate-900 rounded-3xl p-6">

            <h2 class="text-2xl font-bold mb-4">
                抽選履歴
            </h2>

            <!-- JavaScriptで履歴を追加 -->
            <div
                id="history"
                class="flex flex-wrap gap-3"
            >
            </div>

        </div>

        <!-- 回答モーダル -->
        <div
            id="answer-modal"
            class="fixed inset-0 bg-black/70 hidden items-center justify-center"
        >

            <div class="bg-slate-900 p-10 rounded-3xl max-w-4xl w-full mx-4">

                <!-- 回答テキスト -->
                <div
                    id="answer-text"
                    class="text-5xl md:text-7xl font-bold text-center break-words whitespace-normal leading-tight px-4"
                >
                </div>

                <!-- 回答画像 -->
                <img
                    id="answer-image"
                    class="hidden mx-auto mt-6 max-h-[400px] rounded-2xl"
                />

                <!-- 回答解説 -->
                <div
                    id="answer-explanation"
                    class="text-4xl text-slate-300 mt-4 text-center"
                >
                </div>

            </div>

        </div>

    </div>

   <script src="/static/js/display.js"></script>
</body>
</html>
