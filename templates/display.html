<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">

    <!-- スマホ対応 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ビンゴ表示</title>

    <!-- Tailwind CSS -->
    <script src="/static/js/tailwind.js"></script>

    <!-- フィーバー演出用CSS -->
    <link rel="stylesheet" href="/static/css/fever.css">
</head>


<body class="bg-slate-950 text-white min-h-screen">

    <!-- 効果音 -->
    <audio
        id="drumroll-sound"
        src="/static/sound/ドラムロール.mp3"
        preload="auto"
        loop>
    </audio>

    <audio
        id="cymbal-sound"
        src="/static/sound/クラッシュシンバル.mp3"
        preload="auto">
    </audio>

    <audio
        id="question-sound"
        src="/static/sound/出題.mp3"
        preload="auto">
    </audio>

    <audio
        id="timer-sound"
        src="/static/sound/タイマー.mp3"
        preload="auto">
    </audio>

    <!-- 全体コンテナ -->
    <div class="max-w-7xl mx-auto px-6 py-12">

        <!-- タイトル -->
        <h1 class="text-6xl font-bold text-center mb-12">
            オネスト納涼会スペシャルBINGO
        </h1>

        <!-- 現在の抽選結果表示エリア -->
        <div class="bg-slate-900 rounded-3xl p-16 shadow-xl text-center">

            <!-- 表示タイトル -->
            <p
                id="result-title"
                class="text-slate-400 text-2xl mb-8"
            >
                抽選結果
            </p>

            <!-- 最新の数字または問題文 -->
            <div
                id="current-number"
                class="font-black break-words"
            >
                -
            </div>

            <!-- クイズ用カウントダウン -->
            <p
                id="timer"
                class="text-4xl font-bold text-red-500 mt-6"
            ></p>

            <!-- 問題画像 -->
            <img
                id="quiz-image"
                class="hidden mx-auto mt-8 max-h-[500px] rounded-2xl"
            />

        </div>

        <!-- 抽選履歴エリア -->
        <div class="mt-10 bg-slate-900 rounded-3xl p-6">

            <h2 class="text-2xl font-bold mb-4">
                抽選履歴
            </h2>

            <!-- JavaScriptで履歴を追加 -->
            <div
                id="history"
                class="flex flex-wrap gap-3"
            >
            </div>

        </div>

        <!-- 回答モーダル -->
        <div
            id="answer-modal"
            class="fixed inset-0 bg-black/70 hidden items-center justify-center"
        >

            <div class="bg-slate-900 p-10 rounded-3xl max-w-2xl">

                <!-- 回答テキスト -->
                <div
                    id="answer-text"
                    class="text-8xl font-bold text-center"
                >
                </div>

                <!-- 回答画像 -->
                <img
                    id="answer-image"
                    class="hidden mx-auto mt-6 max-h-[400px] rounded-2xl"
                />

                <!-- 回答解説 -->
                <div
                    id="answer-explanation"
                    class="text-4xl text-slate-300 mt-4 text-center"
                >
                </div>

            </div>

        </div>

    </div>

    <script>
    let lastValue = null;
    let isAnimating = false;
    let lastShowAnswer = false;

    async function refresh() {
        try {
            const response = await fetch("/state");
            const data = await response.json();

            const current = document.getElementById("current-number");
            const timerEl = document.getElementById("timer");
            const quizImage = document.getElementById("quiz-image");

            if (data.type === "quiz") {
                current.className =
                    "text-5xl md:text-7xl font-black break-words transition-transform duration-300";
            } else {
                current.className =
                    "text-[12rem] md:text-[16rem] font-black leading-none transition-transform duration-300";
            }

            if (data.current !== lastValue && !isAnimating) {
                isAnimating = true;
                lastValue = data.current;

                timerEl.textContent = "";
                quizImage.src = "";
                quizImage.classList.add("hidden");

                let count = 0;

                const drumrollSound =
                    document.getElementById("drumroll-sound");

                drumrollSound.currentTime = 0;
                drumrollSound.play();

                const roulette = setInterval(() => {
                    current.textContent =
                        Math.floor(Math.random() * 75) + 1;

                    count++;

                    if (count >= 20) {
                        clearInterval(roulette);

                        drumrollSound.pause();
                        drumrollSound.currentTime = 0;

                        current.textContent = data.current;

                        if (data.type === "number") {
                            const cymbalSound =
                                document.getElementById("cymbal-sound");

                            cymbalSound.currentTime = 0;
                            cymbalSound.play();
                        }

                        if (data.type === "quiz") {
                            const questionSound =
                                document.getElementById("question-sound");

                            questionSound.currentTime = 0;
                            questionSound.play();

                            if (!data.fever) {

                                const timerSound =
                                    document.getElementById("timer-sound");

                                timerSound.currentTime = 0;
                                timerSound.play();
                            }

                            if (data.image_q) {
                                quizImage.src = data.image_q;
                                quizImage.classList.remove("hidden");
                            }
                        }

                        current.classList.add("scale-125");

                        setTimeout(() => {
                            current.classList.remove("scale-125");
                            isAnimating = false;
                        }, 300);
                    }
                }, 50);

                return;
            }

            if (!isAnimating) {
                current.textContent = data.current;
            }

            document.getElementById("answer-text").textContent =
                data.type === "quiz" ? (data.answer || "") : "";

            document.getElementById("answer-explanation").textContent =
                data.type === "quiz" ? (data.explanation || "") : "";

            const historyDiv = document.getElementById("history");
            historyDiv.innerHTML = "";

            for (const number of data.history.slice().reverse()) {
                const item = document.createElement("div");

                item.className =
                    "bg-slate-800 px-4 py-2 rounded-xl text-xl font-bold";

                item.textContent = number;
                historyDiv.appendChild(item);
            }

            const modal = document.getElementById("answer-modal");

            if (data.show_answer) {
                modal.classList.remove("hidden");
                modal.classList.add("flex");
            } else {
                modal.classList.remove("flex");
                modal.classList.add("hidden");
            }
            if (
                    data.show_answer &&
                    !lastShowAnswer
                ) {

                    const cymbalSound =
                        document.getElementById("cymbal-sound");

                    cymbalSound.currentTime = 0;
                    cymbalSound.play();
                }

                lastShowAnswer = data.show_answer;

            if (
                data.type === "quiz" &&
                data.image_q &&
                !isAnimating
            ) {
                quizImage.src = data.image_q;
                quizImage.classList.remove("hidden");
            } else if (data.type !== "quiz") {
                quizImage.src = "";
                quizImage.classList.add("hidden");
            }

            const answerImage = document.getElementById("answer-image");

            if (data.type === "quiz" && data.image_a) {
                answerImage.src = data.image_a;
                answerImage.classList.remove("hidden");
            } else {
                answerImage.src = "";
                answerImage.classList.add("hidden");
            }

            const timerSound =
                document.getElementById("timer-sound");

            if (
                data.type === "quiz" &&
                data.remaining !== null &&
                !data.fever &&
                !isAnimating
            ) {
                timerEl.textContent = `残り ${data.remaining} 秒`;

                if (data.remaining <= 3) {
                    timerEl.classList.add("text-red-600");
                    timerEl.classList.remove("text-red-500");
                } else {
                    timerEl.classList.add("text-red-500");
                    timerEl.classList.remove("text-red-600");
                }
            } else {
                timerEl.textContent = "";
            }

            const title = document.getElementById("result-title");

            if (data.fever) {
                title.textContent = "✨ フィーバータイム！！ ✨";
                title.classList.add("fever-mode");
            } else {
                title.textContent = "抽選結果";
                title.classList.remove("fever-mode");
            }

        } catch (error) {
            console.error(error);
        }
    }

    setInterval(refresh, 500);
    refresh();
</script>
</body>
</html>
