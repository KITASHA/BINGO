<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>クイズ管理</title>

    <script src="/static/js/tailwind.js"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen">

    <div class="max-w-7xl mx-auto px-6 py-10">

        <div class="flex items-center justify-between mb-10">
            <div>
                <p class="text-slate-400 text-sm tracking-widest">BINGO ADMIN</p>
                <h1 class="text-4xl font-bold mt-2">クイズ管理</h1>
            </div>
            <div class="flex gap-3">
                <a
                    href="/admin/quizzes/new"
                    class="bg-blue-600 hover:bg-blue-500 text-white px-5 py-3 rounded-xl font-bold"
                >
                    ＋ 新規作成
                </a>

                <a
                    href="/controller"
                    class="bg-slate-800 hover:bg-slate-700 text-white px-5 py-3 rounded-xl"
                >
                    コントローラーへ
                </a>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">

            <section class="bg-slate-900 rounded-3xl p-6 shadow-xl lg:col-span-1">
                <h2 class="text-2xl font-bold mb-6">クイズ追加</h2>

                <form method="post" action="/admin/quizzes" class="space-y-5">

                    <div>
                        <label class="block text-sm text-slate-400 mb-2">番号</label>
                        <input
                            type="number"
                            name="number"
                            class="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-white"
                            placeholder="例：43"
                        >
                    </div>

                    <div>
                        <label class="block text-sm text-slate-400 mb-2">問題</label>
                        <input
                            type="text"
                            name="question"
                            required
                            class="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-white"
                            placeholder="問題文"
                        >
                    </div>

                    <div>
                        <label class="block text-sm text-slate-400 mb-2">答え</label>
                        <input
                            type="text"
                            name="answer"
                            required
                            class="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-white"
                            placeholder="答え"
                        >
                    </div>

                    <div>
                        <label class="block text-sm text-slate-400 mb-2">解説</label>
                        <textarea
                            name="explanation"
                            rows="4"
                            class="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-white"
                            placeholder="解説"
                        ></textarea>
                    </div>

                    <div>
                        <label class="block text-sm text-slate-400 mb-2">問題画像パス</label>
                        <input
                            type="text"
                            name="image_q"
                            class="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-white"
                            placeholder="/static/images/example.jpg"
                        >
                    </div>

                    <div>
                        <label class="block text-sm text-slate-400 mb-2">回答画像パス</label>
                        <input
                            type="text"
                            name="image_a"
                            class="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-white"
                            placeholder="/static/images/example_answer.jpg"
                        >
                    </div>

                    <div class="space-y-3">
                        <label class="flex items-center gap-3 text-slate-300">
                            <input type="checkbox" name="fever" class="w-5 h-5">
                            フィーバー問題
                        </label>

                        <label class="flex items-center gap-3 text-slate-300">
                            <input type="checkbox" name="exclude" class="w-5 h-5">
                            この番号を通常抽選から除外
                        </label>
                    </div>

                    <button
                        type="submit"
                        class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-4 rounded-xl text-lg"
                    >
                        追加する
                    </button>
                </form>
            </section>

            <section class="bg-slate-900 rounded-3xl p-6 shadow-xl lg:col-span-2">
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-2xl font-bold">クイズ一覧</h2>
                    
                    <p class="text-slate-400">{{ quizzes|length }} 件</p>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="border-b border-slate-700 text-slate-400">
                                <th class="py-3 pr-4 w-20">番号</th>
                                <th class="py-3 pr-4">問題</th>
                                <th class="py-3 pr-4 w-40">操作</th>
                            </tr>
                        </thead>

                        <tbody>
                            {% for quiz in quizzes %}
                            <tr class="border-b border-slate-800 hover:bg-slate-800/60">
                                <td class="py-4 pr-4 font-bold">
                                    {{ quiz.number or "-" }}
                                </td>

                                <td class="py-4 pr-4">
                                    <div class="font-semibold truncate max-w-xl">
                                        {{ quiz.question }}
                                    </div>
                                    <div class="text-sm text-slate-500 truncate max-w-xl">
                                        答え：{{ quiz.answer }}
                                    </div>
                                </td>

                                <td class="py-4 pr-4">
                                    <div class="flex gap-2">
                                        <a
                                            href="/admin/quizzes/{{ quiz.id }}/edit"
                                            class="bg-sky-600 hover:bg-sky-500 text-white px-3 py-2 rounded-lg text-sm"
                                        >
                                            編集
                                        </a>

                                        <form
                                            method="post"
                                            action="/admin/quizzes/{{ quiz.id }}/delete"
                                            onsubmit="return confirm('このクイズを削除しますか？');"
                                        >
                                            <button
                                                type="submit"
                                                class="bg-rose-600 hover:bg-rose-500 text-white px-3 py-2 rounded-lg text-sm"
                                            >
                                                削除
                                            </button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </section>

        </div>
    </div>

</body>
</html>
