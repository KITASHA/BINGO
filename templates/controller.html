<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ビンゴ操作画面</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-950 text-white min-h-screen">
    <div class="max-w-5xl mx-auto px-6 py-12">
        <h1 class="text-6xl font-bold text-center mb-12">
            BINGO
        </h1>

        <div class="bg-slate-900 rounded-3xl p-10 shadow-xl text-center">
            <p class="text-slate-400 text-xl mb-4">
                操作画面
            </p>

            <div id="result" class="text-8xl font-black mb-10">-</div>

            <div class="flex justify-center gap-4">
                <button onclick="drawNumber()"
                    class="bg-blue-600 hover:bg-blue-500 px-8 py-4 rounded-2xl text-xl font-bold">
                    抽選する
                </button>

                <select id="quiz-select"
                    class="bg-slate-800 px-4 py-3 rounded-xl text-lg">
                </select>

                <button onclick="showQuiz()"
                    class="bg-amber-600 hover:bg-amber-500 px-8 py-4 rounded-2xl text-xl font-bold">
                    問題表示
                </button>
            </div>
        </div>
    </div>

    <script>
        // 抽選
        async function drawNumber() {
            const res = await fetch("/draw");
            const data = await res.json();

            if (!data.success) {
                alert("すべて抽選済みです");
                return;
            }

            document.getElementById("result").textContent = data.number;
        }

        // クイズ一覧取得
        async function loadQuizList() {
            const res = await fetch("/quiz-list");
            const data = await res.json();

            const select = document.getElementById("quiz-select");
            select.innerHTML = "";

            data.quizzes.forEach((quiz, index) => {
                const option = document.createElement("option");
                option.value = index;
                option.textContent = quiz;
                select.appendChild(option);
            });
        }

        // クイズ表示
        async function showQuiz() {
            const quizId = parseInt(
                document.getElementById("quiz-select").value
            );

            const res = await fetch(`/quiz/${quizId}`);
            const data = await res.json();

            console.log(data);

            document.getElementById("result").textContent = "問題表示中";
        }

        loadQuizList();
    </script>
</body>
</html>
